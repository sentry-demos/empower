version: 2
updates:
  - package-ecosystem: npm
    open-pull-requests-limit: 0 # security updates only
    
    # 1. Use the plural "directories" key with a wildcard glob
    directories:
      - "/**" # Recursively scans the root and ALL subdirectories for package.json files
      
    schedule:
      interval: daily
      timezone: America/Los_Angeles
      time: '16:00'
    reviewers:
      - '@sentry-demos/am-team'
    labels: []

    # 2. Tell Dependabot to handle grouping dynamically
    groups:
      all-monorepo-security:
        applies-to: security-updates
        patterns:
          - '*'
